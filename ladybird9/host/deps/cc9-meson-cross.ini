# Meson cross-file for the cc9 toolchain (clang -> Plan 9 amd64 a.out).
# Used by build-dav1d.sh. Paths are absolute so meson can run from any cwd;
# they assume the standard agent9 checkout layout under $HOME/Projects/agent9.
# (build-dav1d.sh rewrites the [binaries] paths at run time to the real repo.)
[binaries]
c = 'CC9CC_PATH'
cpp = 'CC9CXX_PATH'
ar = 'LLVM_AR_PATH'
strip = 'LLVM_STRIP_PATH'
pkg-config = 'pkg-config'

[host_machine]
# 'linux' selects dav1d's generic POSIX/pthread paths (cc9 provides pthreads,
# mmap-backed alloc, sysconf); there is no 'plan9' arm in dav1d's meson.build,
# and Plan 9 is POSIX-enough here with asm disabled.
system = 'linux'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[built-in options]
default_library = 'static'
# cc9 targets a freestanding-ish libc; keep meson from assuming a full hosted
# feature set it will probe wrong. dav1d only needs C11 + pthreads.
c_std = 'c11'
