# Default dosbox9 config for 9front. Copy and edit for your own games.

[sdl]
fullscreen=false
# surface is the ONLY output dosbox9 has: the Plan 9 backend presents through
# gl9win2, and there is no GL path (llvmpipe would be pointless for DOSBox's
# software surface).
output=surface
autolock=false
waitonerror=false

[dosbox]
machine=svga_s3
memsize=16

[cpu]
# normal = the portable interpreter. dynrec needs W^X (a wxallow kernel) AND a
# real mprotect; cc9's mprotect is a no-op, so it is compiled out.
core=normal
# max, not a fixed count: the emulated work is a fixed instruction count, so
# more cycles/ms is less wall clock, and the interpreter leaves cycles spare.
# `fixed 20000` (~386DX) had DOSBox sleeping ~83% of the time while DOOM's
# R_Init crawled through a genuinely 386-speed startup.
cycles=max

[mixer]
nosound=false
rate=44100
blocksize=1024

[sblaster]
sbtype=sb16
oplmode=auto

[autoexec]
# Add your own mounts here, e.g.:
#   mount c /usr/glenda/games
#   c:
