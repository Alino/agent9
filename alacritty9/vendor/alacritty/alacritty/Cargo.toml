[package]
name = "alacritty"
version = "0.17.0"
authors = ["Christian Duerr <contact@christianduerr.com>", "Joe Wilm <joe@jwilm.com>"]
license = "Apache-2.0"
description = "A fast, cross-platform, OpenGL terminal emulator"
readme = "README.md"
homepage = "https://alacritty.org"
repository = "https://github.com/alacritty/alacritty"
edition.workspace = true
rust-version.workspace = true

[dependencies.alacritty_terminal]
path = "../alacritty_terminal"
version = "0.26.0"

[dependencies.alacritty_config_derive]
path = "../alacritty_config_derive"
version = "0.2.5"

[dependencies.alacritty_config]
path = "../alacritty_config"
version = "0.2.3"

[dependencies]
# alacritty9: default-features off — runtime-rng pulls getrandom, which has
# no plan9 backend (no-rng alone is additive and doesn't disable it).
ahash = { version = "0.8.6", default-features = false, features = ["no-rng", "std"] }
bitflags = "2.2.1"
clap = { version = "4.2.7", features = ["derive", "env"] }
copypasta = { version = "0.10.1", default-features = false }
crossfont = "0.8.1"
glutin = { version = "0.32.2", default-features = false, features = ["egl", "wgl"] }
home = "0.5.5"
log = { version = "0.4", features = ["std", "serde"] }
parking_lot = "0.12.0"
polling = "3.11.0"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9.25"
toml.workspace = true
toml_edit.workspace = true
unicode-width = "0.2.0"
winit = { version = "0.30.9", default-features = false, features = ["rwh_06", "serde"] }

[build-dependencies]
gl_generator = "0.14.0"

[dev-dependencies]
clap_complete = "4.2.3"

# alacritty9: libc/signal-hook/notify/tempfile have no plan9 build; their use
# sites are cfg-gated (see PORT-NOTES.md).
[target.'cfg(unix)'.dependencies]
libc = "0.2"
signal-hook = { version = "0.4.3", default-features = false }

[target.'cfg(any(unix, windows))'.dependencies]
notify = "8.0.0"
tempfile = "3.12.0"

[target.'cfg(all(not(windows), not(target_os = "plan9")))'.dependencies]
xdg = "3.0.0"

[target.'cfg(not(target_os = "macos"))'.dependencies]
png = { version = "0.17.5", default-features = false, optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6.1"
objc2-foundation = { version = "0.3.1", default-features = false, features = [
    "std",
    "NSString",
    "NSLocale",
    "NSUserDefaults",
] }
objc2-app-kit = { version = "0.3.1", default-features = false, features = [
    "std",
    "NSColorSpace",
    "NSResponder",
    "NSView",
    "NSWindow",
] }

[target.'cfg(windows)'.dependencies]
dirs = "6.0.0"
windows-sys = { version = "0.59", features = [
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Threading",
    "Win32_System_Console",
    "Win32_Foundation",
]}

[target.'cfg(windows)'.build-dependencies]
embed-resource = "3.0.2"

[features]
default = ["wayland", "x11"]
x11 = [
    "copypasta/x11",
    "winit/x11",
    "glutin/x11",
    "glutin/glx",
    "png",
]
wayland = [
    "copypasta/wayland",
    "glutin/wayland",
    "winit/wayland",
    "winit/wayland-dlopen",
    "winit/wayland-csd-adwaita-crossfont",
]
nightly = []
