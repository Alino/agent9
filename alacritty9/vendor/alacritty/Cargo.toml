[workspace]
members = [
    "alacritty",
    "alacritty_terminal",
    "alacritty_config",
    "alacritty_config_derive",
]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.85.0"

[profile.release]
# alacritty9: lto off (untested with the rust9-ld/elf2aout link), panic=abort
# (matches build-std panic_abort; no unwinder needed).
lto = "off"
debug = 1
incremental = false
panic = "abort"

[profile.dev]
panic = "abort"

[workspace.dependencies]
toml = "0.9.11"
toml_edit = "0.24.0"

# alacritty9: Plan 9 port substitutions (see alacritty9/PORT-NOTES.md).
# winit is the vendored tree with the plan9 platform backend; polling/glutin/
# crossfont have no possible plan9 build (epoll/dlopen/fontconfig) and are
# replaced by API-compatible shims over the gl9/cc9 substrate.
[patch.crates-io]
polling = { path = "../../shim/polling" }
winit = { path = "../winit" }
home = { path = "../../shim/home" }
crossfont = { path = "../../shim/crossfont" }
glutin = { path = "../../shim/glutin" }
