# plan9 has no system FreeType and no pkg-config, and freetype-sys's default path
# does `pkg_config::probe(...).unwrap()` — which refuses to cross-compile at all.
# Its `bundled` feature compiles the vendored FreeType with cc-rs instead, which
# routes through the cc9 wrapper. The `freetype` crate exposes no passthrough for
# it, so depend on freetype-sys directly and let cargo's feature unification turn
# `bundled` on for the whole graph.
[target.'cfg(target_os = "plan9")'.dependencies.freetype-sys]
version = "0.23"
features = ["bundled"]

# plan9 uses the same FreeType backend, so it needs libc for the same reasons.
